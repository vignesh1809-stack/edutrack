spring.application.name=edutrack

# MASTER DB (Writes)
spring.datasource.master.url=${DB_MASTER_URL:jdbc:mysql://localhost:3306/edutrack?createDatabaseIfNotExist=true}
spring.datasource.master.username=${DB_MASTER_USERNAME:root}
spring.datasource.master.password=${DB_MASTER_PASSWORD:Start#123}
spring.datasource.master.driver-class-name=com.mysql.cj.jdbc.Driver

# REPLICA DB (Reads)
# Local default points to master so dev machines don't need a replica running.
# Override DB_REPLICA_URL in staging/prod to point at the actual read replica.
spring.datasource.replica.url=${DB_REPLICA_URL:jdbc:mysql://localhost:3306/edutrack?createDatabaseIfNotExist=true}
spring.datasource.replica.username=${DB_REPLICA_USERNAME:root}
spring.datasource.replica.password=${DB_REPLICA_PASSWORD:Start#123}
spring.datasource.replica.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Set to true in staging/prod (requires Redis running).
# false = login works without Redis; token revocation is skipped until Redis is available.
app.redis.required=${REDIS_REQUIRED:false}

websiteUrl=${WEBSITE_URL:http://localhost:3000/}

# CORS — comma-separated list of allowed origins
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Hibernate Batching Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# ─── JWT Configuration ───────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:edutrack_horizon_enterprise_secret_key_2026_jwt_token_signing_key}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRY_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRY_MS:604800000}
