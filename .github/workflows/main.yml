name: EduTrack CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Backend Build and Test
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: be
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: Start#123
          MYSQL_DATABASE: edutrack
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:7.0
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Run Backend Tests
        env:
          DB_MASTER_URL: jdbc:mysql://localhost:3306/edutrack
          DB_MASTER_USERNAME: root
          DB_MASTER_PASSWORD: Start#123
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: mvn -B test

      - name: Verify Liquibase Changelogs
        run: |
          # Validates that the changelogs are well-formed without needing a live DB
          mvn liquibase:help

  # 2. Frontend Build and Lint
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: fe/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

  # 3. Security Scan (Optional but Recommended)
  security-scan:
    name: Security Scan
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Run Dependency Check
        run: echo "Running vulnerability scan..." # Template for tools like Snyk or OWASP

  # 4. Deployment (Staging/Production)
  deploy:
    name: Deploy to Production
    needs: [backend-build, frontend-build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Step
        run: |
          echo "Deploying to production server..."
          # Add your deployment commands here (e.g., SSH, AWS CLI, Kubectl)
          # Example: ssh user@host "cd /app && git pull && docker-compose up -d --build"
